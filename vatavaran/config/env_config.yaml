# Runtime and sandbox limits.

sandbox:
  output_token_limit: 16384
  execution_timeout_sec: 30
  blocked_imports:
    - matplotlib
    - seaborn
  pre_init_code: |
    import pandas as pd
    pd.set_option("display.width", 427)
    pd.set_option("display.max_columns", 10)
  forbid_write_patterns:
    - "to_csv\\("
    - "to_json\\("
    - "to_parquet\\("
    - "to_excel\\("
    - "open\\([^\\)]*,\\s*['\\\"][wax\\+]"
